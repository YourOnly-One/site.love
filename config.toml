####### Base Config #######
  baseURL = "https://im.youronly.one/love"                    # .Site.BaseURL
  title = "Love and Relationship"               # .Site.Title; IMPT for Schema.org; OpenGraph; Twitter Cards -- for RDFa, Microdata, JSON-LD
  copyright = ""                                          # .Site.Copyright; we are using our own footer
  timeZone = "Asia/Manila"


####### Site settings #######
  #footnoteAnchorPrefix = ""                              # prefix for footnote anchors
  footnoteReturnLinkContents = "↩"                        # text to display for footnote return links
  paginate = 8
  #paginatePath = "page"                                  # https://example.com/page/2
  rssLimit = 100
  summaryLength = 70

  #### Other settings ####
    disqusShortname = "youronlyone"                       # .Site.DisqusShortname
    #googleAnalytics = ""                     # .Site.GoogleAnalytics


####### Backend settings #######
  canonifyURLs = true                                     # true for our use-case
  #disableAliases = true                                  # use this if we want to use server redirects
  enableEmoji = true                                      # format :smile:
  enableGitInfo = false                                   # it is in Git time
  enableInlineShortcodes = false                          # disabled for security reasons as per Hugo documentation
  enableRobotsTXT = false                                 # Hugo robots.txt template
  relativeURLs = false                                    # false for our use-case; make all relative URLs relative to content root
  refLinksNotFoundURL = "https://im.youronly.one/love/"

  ## Dev settings ##
    publishDir = "../../live/public/love"
    enableMissingTranslationPlaceholders = true

  ## Other settings ##
    PygmentsCodeFences = true
    PygmentsStyle = "monokai"
    #disableKinds = [""]                                # we are using Atom

#### LANG stuff ####
  defaultContentLanguage = "en-ph"
  #defaultContentLanguage = "tl-tglg"
  defaultContentLanguageInSubdir = false                  # false -- homepage is using HTML redirect which is blocked by some browsers
  hasCJKLanguage = true
  languageCode = "en-ph"

  ## Theme settings ##
    #pluralizeListTitles = false
  ## Theme settings ##


#######  #######  #######  #######  #######  #######  #######  #######


[author]                                                    # .Site.Author
  name = "ᜌᜓᜃᜒ (Yuki ・ 雪亮)"
  email = ""
  homepage = "https://youronly.one"
  rel = "me noopener"
  #rel = "noopener external nofollow"
  avatar = "https://rsc.youronly.one/img/y/Yuki_flag-square-300x.webp"


#######  #######  #######  #######  #######  #######  #######  #######


[build]
  useResourceCacheWhen = "fallback"
  writeStats = false


#######  #######  #######  #######  #######  #######  #######  #######


[caches]
  [caches.assets]
  dir = ":resourceDir/_gen"
  maxAge = "1h"

  [caches.getcsv]
  dir = ":cacheDir/:project"
  maxAge = "1h"

  [caches.getjson]
  dir = ":cacheDir/:project"
  maxAge = "1h"

  [caches.images]
  dir = ":resourceDir/_gen"
  maxAge = "1h"

  [caches.modules]
  dir = ":cacheDir/modules"
  maxAge = "1h"


#######  #######  #######  #######  #######  #######  #######  #######


[frontmatter]
  date = ["date", "publishDate"]
  expiryDate = ["expiryDate"]
  lastmod = ["lastmod", "date", "publishDate"]  # do not use :fileModTime and :default (default includes git date)
  publishDate = ["publishDate", "date"]


#######  #######  #######  #######  #######  #######  #######  #######


[imaging]
  resampleFilter = "box"
  quality = 100 # JPEG and WebP quality setting. Default is 75.
  #hint = "photo" # picture; photo; drawing; icon; text
  anchor = "smart" # for cropping; center, topleft, top, topright, right, bottomright, bottom, bottomleft, left


